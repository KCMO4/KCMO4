        font-family="'JetBrains Mono','Cascadia Code','DejaVu Sans Mono',Consolas,monospace"
        font-size="24" font-weight="700" fill="url(#rgb)" filter="url(#glow)">
    <tspan x="390" dy="0">в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—</tspan>
    <tspan x="390" dy="30">в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘</tspan>
    <tspan x="390" dy="30">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ  в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘</tspan>
    <tspan x="390" dy="30">в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘ в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘</tspan>
    <tspan x="390" dy="30">в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•— в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ      в–Ҳв–Ҳв•‘</tspan>
    <tspan x="390" dy="30">в•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ     в•ҡв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•қ       в•ҡв•җв•қ</tspan>
  </text>

  <text x="390" y="234" text-anchor="middle"
        font-family="'JetBrains Mono','DejaVu Sans Mono',Consolas,monospace"
        font-size="13" letter-spacing="1.5" fill="#6e7681">// senior software engineer В· building with AI <tspan fill="#e6edf3">в–Ҳ<animate attributeName="opacity" values="1;1;0;0" dur="1.06s" repeatCount="indefinite"/></tspan></text>
</svg>
